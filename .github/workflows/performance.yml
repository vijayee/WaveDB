name: Performance Check

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DBUILD_BENCHMARKS=ON -DBUILD_TESTS=ON

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Run unit tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Run performance benchmarks
      run: |
        ./scripts/run_benchmarks.sh
      continue-on-error: true

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: benchmark-results
        path: .benchmarks/*.json

    - name: Check performance regressions
      run: |
        ./scripts/run_benchmarks.sh
      id: perf_check

    - name: Report status
      if: failure()
      run: |
        echo "::warning::Performance regression detected. Please review benchmark results."
        echo "To accept new baselines, update .benchmarks/*_baseline.json files"

  stress-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DBUILD_STRESS_TESTS=ON

    - name: Build
      run: |
        cd build
        make -j$(nproc) test_concurrent_sections test_resource_limits test_long_running

    - name: Run stress tests
      run: |
        cd build
        echo "Running concurrent sections stress test..."
        ./test_concurrent_sections --gtest_filter=*ConcurrentWrites || true

        echo "Running resource limits stress test..."
        ./test_resource_limits --gtest_filter=*MaximumOpenSections || true

        echo "Running long-running stability test..."
        ./test_long_running --gtest_filter=*SustainedOperations || true